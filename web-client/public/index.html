<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hauling App</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
    #app { max-width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 24px; }
    .hidden { display: none; }
    #map { width: 100%; height: 300px; border-radius: 8px; margin-top: 16px; }
    input, button { width: 100%; margin: 8px 0; padding: 10px; border-radius: 4px; border: 1px solid #ccc; }
    button { background: #0078a8; color: #fff; border: none; cursor: pointer; }
    button:disabled { background: #aaa; }
    .link { color: #0078a8; cursor: pointer; text-decoration: underline; font-size: 0.95em; }
    .error { color: #c00; font-size: 0.95em; }
    .success { color: #080; font-size: 0.95em; }
  </style>
</head>
<body>
  <div id="app">
    <div id="auth-forms">
      <form id="signin-form">
        <h2>Sign In</h2>
        <input id="signin-email" type="email" placeholder="Email" required />
        <input id="signin-password" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
        <div class="link" id="to-signup">Don't have an account? Sign Up</div>
        <div class="link" id="to-reset">Forgot password?</div>
        <div class="error" id="signin-error"></div>
      </form>
      <form id="signup-form" class="hidden">
        <h2>Sign Up</h2>
        <input id="signup-name" type="text" placeholder="Name" required />
        <input id="signup-email" type="email" placeholder="Email" required />
        <input id="signup-password" type="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
        <div class="link" id="to-signin">Already have an account? Sign In</div>
        <div class="error" id="signup-error"></div>
      </form>
      <form id="reset-form" class="hidden">
        <h2>Reset Password</h2>
        <input id="reset-email" type="email" placeholder="Email" required />
        <button type="submit">Send Reset Link</button>
        <div class="link" id="to-signin2">Back to Sign In</div>
        <div class="success" id="reset-success"></div>
        <div class="error" id="reset-error"></div>
      </form>
    </div>
    <div id="main-app" class="hidden">
      <h2>Welcome, <span id="user-name"></span></h2>
      <button id="signout">Sign Out</button>
      <div id="map"></div>
      <button id="update-location">Update My Location</button>
      <button id="find-drivers">Find Nearby Drivers</button>
      <div id="drivers-list"></div>
    </div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
